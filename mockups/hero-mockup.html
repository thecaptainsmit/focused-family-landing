<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Morning Routine Chart - Product Mockup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 40px; }
        
        .scene { 
            width: 1200px; 
            height: 1200px; 
            background: linear-gradient(135deg, #e8ddd4 0%, #f5ebe0 100%);
            position: relative;
            margin: 0 auto;
            overflow: hidden;
        }
        
        /* Wall texture */
        .wall {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(200,180,160,0.2) 0%, transparent 50%),
                #f0e6dc;
        }
        
        /* Window */
        .window {
            position: absolute;
            top: 80px;
            right: 100px;
            width: 300px;
            height: 400px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 12px solid #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .window::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 8px;
            background: #fff;
        }
        
        .window::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 8px;
            background: #fff;
        }
        
        /* Bed */
        .bed {
            position: absolute;
            bottom: 0;
            left: 100px;
            width: 500px;
            height: 350px;
        }
        
        .bed-frame {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: #8B7355;
            border-radius: 8px 8px 0 0;
        }
        
        .mattress {
            position: absolute;
            bottom: 60px;
            left: 20px;
            right: 20px;
            height: 60px;
            background: #fff;
            border-radius: 10px;
        }
        
        .blanket {
            position: absolute;
            bottom: 80px;
            left: 10px;
            right: 10px;
            height: 200px;
            background: linear-gradient(180deg, #6B8E8A 0%, #5A7D79 100%);
            border-radius: 20px 20px 0 0;
            transform: perspective(500px) rotateX(5deg);
        }
        
        .blanket::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255,255,255,0.1) 20px,
                rgba(255,255,255,0.1) 40px
            );
        }
        
        /* Pillow */
        .pillow {
            position: absolute;
            bottom: 220px;
            left: 60px;
            width: 120px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transform: rotate(-10deg);
        }
        
        /* THE CHART */
        .chart-container {
            position: absolute;
            top: 200px;
            left: 150px;
            width: 450px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 30px;
            transform: perspective(1000px) rotateY(-5deg) rotateX(2deg);
        }
        
        .chart-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .chart-header h1 {
            color: #1a365d;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .chart-header p {
            color: #666;
            font-size: 14px;
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .task {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .task:hover {
            border-color: #f6e05e;
        }
        
        .task-number {
            width: 32px;
            height: 32px;
            background: #1a365d;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .task-text {
            flex: 1;
        }
        
        .task-title {
            font-weight: 600;
            color: #1a365d;
            font-size: 16px;
        }
        
        .task-detail {
            font-size: 12px;
            color: #666;
        }
        
        .checkbox {
            width: 28px;
            height: 28px;
            border: 3px solid #1a365d;
            border-radius: 6px;
            margin-left: 15px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .checkbox.checked {
            background: #48bb78;
            border-color: #48bb78;
        }
        
        .checkbox.checked::after {
            content: '✓';
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }
        
        .task:nth-child(1) .checkbox { background: #48bb78; border-color: #48bb78; }
        .task:nth-child(1) .checkbox::after { content: '✓'; color: #fff; font-size: 18px; font-weight: bold; }
        
        .streak-section {
            margin-top: 25px;
            padding: 20px;
            background: #f0fff4;
            border-radius: 8px;
            border: 2px solid #48bb78;
            text-align: center;
        }
        
        .streak-label {
            color: #1a365d;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .stars {
            font-size: 24px;
            letter-spacing: 5px;
        }
        
        /* Hand pointing */
        .hand {
            position: absolute;
            bottom: 280px;
            left: 480px;
            width: 100px;
            height: 120px;
            z-index: 10;
        }
        
        .finger {
            position: absolute;
            width: 20px;
            height: 50px;
            background: #f5d0c5;
            border-radius: 10px;
            transform: rotate(-30deg);
        }
        
        .finger::after {
            content: '';
            position: absolute;
            top: -15px;
            left: 0;
            width: 20px;
            height: 25px;
            background: #f5d0c5;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="wall"></div>
        <!-- Window -->
        <div class="window"></div>
        
        <!-- Bed -->
        <div class="bed">
            <div class="bed-frame"></div>
            <div class="mattress"></div>
            <div class="blanket"></div>
            <div class="pillow"></div>
        </div>
        
        <!-- Chart -->
        <div class="chart-container">
            <div class="chart-header">
                <h1>Morning Routine</h1>
                <p>Check off each task as you finish!</p>
            </div>
            
            <div class="task-list">
                <div class="task">
                    <div class="task-number">1</div>
                    <div class="task-text">
                        <div class="task-title">Wake Up</div>
                        <div class="task-detail">Open curtains, stretch</div>
                    </div>
                    <div class="checkbox"></div>
                </div>
                
                <div class="task">
                    <div class="task-number">2</div>
                    <div class="task-text">
                        <div class="task-title">Bathroom</div>
                        <div class="task-detail">Potty, wash hands, brush teeth</div>
                    </div>
                    <div class="checkbox"></div>
                </div>
                
                <div class="task">
                    <div class="task-number">3</div>
                    <div class="task-text">
                        <div class="task-title">Get Dressed</div>
                        <div class="task-detail">Pick from 2 outfits</div>
                    </div>
                    <div class="checkbox"></div>
                </div>
                
                <div class="task">
                    <div class="task-number">4</div>
                    <div class="task-text">
                        <div class="task-title">Eat Breakfast</div>
                        <div class="task-detail">Protein first</div>
                    </div>
                    <div class="checkbox"></div>
                </div>
                
                <div class="task">
                    <div class="task-number">5</div>
                    <div class="task-text">
                        <div class="task-title">Pack Bag</div>
                        <div class="task-detail">Lunch, water, homework</div>
                    </div>
                    <div class="checkbox"></div>
                </div>
                
                <div class="task">
                    <div class="task-number">6</div>
                    <div class="task-text">
                        <div class="task-title">Shoes On</div>
                        <div class="task-detail">Ready to go!</div>
                    </div>
                    <div class="checkbox"></div>
                </div>
            </div>
            
            <div class="streak-section">
                <div class="streak-label">Streak: 5 days! 🎉</div>
                <div class="stars">★★★★★</div>
            </div>
        </div>
        
        <!-- Hand pointing -->
        <div class="hand">
            <div class="finger"></div>
        </div>
    </div>
</body>
</html>
